<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>色票生成工具 — Out of Design</title>
<meta name="description" content="一鍵生成圖片色票 方便你分享到社群媒體">
<link rel="icon" type="image/png" href="https://out-of-design.com/wp-content/uploads/2023/05/favicon.png">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px 0;}
  h1{font-size:22px;font-weight:600;letter-spacing:.03em;margin-bottom:4px;}
  .subtitle{font-size:13px;color:#888;margin-bottom:32px;}
  .layout{display:flex;gap:24px;align-items:flex-start;width:100%;max-width:700px;}
  .panel{flex:1;min-width:0;background:#fff;border:1px solid #e8e8e8;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06);}
  .preview-col{width:165px;flex-shrink:0;position:sticky;top:40px;}
  #live-canvas{width:165px;height:293px;border-radius:10px;display:block;background:#f0f0f0;border:1px solid #e8e8e8;box-shadow:0 4px 20px rgba(0,0,0,.1);}
  .preview-label{font-size:11px;color:#aaa;text-align:center;margin-top:8px;letter-spacing:.04em;}
  #drop-zone{border:1.5px dashed #d0d0d0;border-radius:12px;padding:28px 16px;text-align:center;cursor:pointer;transition:background .2s,border-color .2s;margin-bottom:18px;background:#fafafa;}
  #drop-zone:hover,#drop-zone.drag-over{background:#f0fafa;border-color:#1ca2a5;}
  #drop-zone p{font-size:12px;color:#aaa;margin-top:6px;}
  #upload-btn{display:inline-block;padding:9px 22px;border:1.5px solid #1ca2a5;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;background:#fff;color:#1ca2a5;margin-bottom:4px;transition:background .2s,color .2s;}
  #upload-btn:hover{background:#1ca2a5;color:#fff;}
  #file-input{display:none;}
  #preview-thumb{width:100%;max-height:120px;object-fit:cover;border-radius:8px;display:none;margin-top:12px;}
  .logo-box{background:#f8f8f8;border:1px solid #ebebeb;border-radius:10px;padding:12px 14px;margin-bottom:16px;}
  .logo-box p{font-size:12px;color:#888;line-height:1.6;}
  #logo-upload-btn{display:inline-block;margin-top:8px;padding:6px 14px;border:1px solid #d0d0d0;border-radius:6px;font-size:12px;cursor:pointer;background:#fff;color:#555;}
  #logo-file-input{display:none;}
  #logo-preview{height:28px;margin-top:8px;display:none;opacity:.8;}
  #logo-status{font-size:11px;margin-top:6px;color:#bbb;}
  .section-label{font-size:11px;font-weight:600;letter-spacing:.09em;color:#aaa;text-transform:uppercase;margin:14px 0 8px;}
  #palette-modes{display:flex;flex-wrap:wrap;gap:6px;}
  .pm-chip{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #e0e0e0;background:#fff;color:#666;}
  .pm-chip.active{background:#1ca2a5;color:#fff;border-color:#1ca2a5;}
  .pm-chip .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;}
  #color-list{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
  .color-row{display:flex;align-items:center;gap:8px;background:#fafafa;border:1px solid #ebebeb;border-radius:8px;padding:7px 10px;}
  .cswatch{width:28px;height:28px;border-radius:6px;flex-shrink:0;position:relative;overflow:hidden;border:1px solid #ddd;cursor:pointer;}
  .cswatch input[type=color]{position:absolute;inset:-4px;width:calc(100% + 8px);height:calc(100% + 8px);opacity:0;cursor:pointer;}
  .cname{flex:1;background:transparent;border:none;outline:none;font-size:12px;font-weight:500;}
  .chex{font-size:11px;color:#aaa;font-family:monospace;}
  .mode-toggle{display:flex;gap:6px;margin-bottom:12px;}
  .mode-btn{flex:1;padding:7px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid #e0e0e0;background:#fff;}
  .mode-btn.active{background:#1ca2a5;color:#fff;border-color:#1ca2a5;}
  .display-options{display:flex;flex-direction:column;gap:8px;}
  .check-row{display:flex;align-items:center;gap:10px;cursor:pointer;padding:7px 10px;border-radius:8px;background:#fafafa;border:1px solid #ebebeb;}
  .check-box{width:18px;height:18px;border-radius:5px;border:1.5px solid #d0d0d0;background:#fff;display:flex;align-items:center;justify-content:center;}
  .check-box.checked{background:#1ca2a5;border-color:#1ca2a5;}
  .check-box.checked::after{content:'';width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);}
  .check-label{font-size:13px;flex:1;}
  .ctrl{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .ctrl label{font-size:12px;color:#888;width:68px;}
  .ctrl input[type=range]{flex:1;}
  .ctrl .val{font-size:12px;font-weight:600;color:#1ca2a5;min-width:28px;text-align:right;}
  .divider{border:none;border-top:1px solid #f0f0f0;margin:14px 0;}
  #generate-btn{width:100%;padding:13px;border:none;border-radius:10px;background:#1ca2a5;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:12px;}
  #generate-btn:disabled{opacity:.35;}
  #download-btn{width:100%;padding:11px;border:1.5px solid #1ca2a5;border-radius:10px;background:#fff;color:#1ca2a5;font-size:14px;display:none;}
  
  /* 商品輪播區塊樣式 */
  .bottom-sections{width:100%;max-width:700px;margin-top:60px;}
  .section-block{margin-bottom:52px;}
  .section-title{font-size:18px;font-weight:700;margin-bottom:20px;}
  .carousel-wrap{overflow:hidden; position: relative;}
  .carousel-track{display:flex;gap:14px;will-change:transform;}
  .product-card{flex:0 0 calc(50% - 7px);background:#fff;border:1px solid #e8e8e8;border-radius:14px;overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column;}
  /* 關鍵修改：不裁切圖片 */
  .product-card-img{width:100%;height:150px;object-fit:contain;background:#f9f9f9;display:block;}
  .product-card-body{padding:12px 14px 16px;flex:1;display:flex;flex-direction:column;gap:6px;}
  .product-card-name{font-size:13px;font-weight:700;line-height:1.4;}
  .product-card-features{font-size:11px;color:#666;line-height:1.6;}
  .product-card-features span{display:block;}
  .product-card-price{display:flex;align-items:baseline;gap:8px;margin-top:4px;}
  .price-original{font-size:11px;color:#bbb;text-decoration:line-through;}
  .price-current{font-size:14px;font-weight:700;color:#1ca2a5;}
  .price-free{font-size:13px;font-weight:700;color:#1ca2a5;background:#e6f7f7;padding:2px 8px;border-radius:20px;}

  .newsletter-cta{background:linear-gradient(135deg,#f0fafa,#ddf2f2);border:1px solid #b2e8e9;border-radius:16px;padding:36px 32px;text-align:center;}
  .cta-btn{display:inline-block;padding:13px 32px;background:#1ca2a5;color:#fff;border-radius:10px;text-decoration:none;font-weight:600;margin-top:20px;}
  .back-home{text-align:center;padding:28px 0 52px;}
  .back-home a{font-size:14px;color:#1ca2a5;text-decoration:none;border-bottom:1px solid rgba(28,162,165,.4);}

  @media(max-width:520px){
    .layout{flex-direction:column-reverse;}
    .product-card{flex:0 0 85%;}
  }
</style>
</head>
<body>

<h1>色票生成工具</h1>
<p class="subtitle">Out of Design · 9:16 直式輸出</p>

<div class="layout">
  <div class="panel">
    <div id="drop-zone">
      <button id="upload-btn" onclick="document.getElementById('file-input').click()">選擇圖片</button>
      <p>或將圖片拖放至此</p>
      <img id="preview-thumb" alt="預覽">

    </div>
    <div class="logo-box">
      <p>上傳你的 LOGO，會自動放在色票圖底部。</p>
      <button id="logo-upload-btn" onclick="document.getElementById('logo-file-input').click()">上傳 LOGO</button>
      <input type="file" id="logo-file-input" accept="image/*">
      <img id="logo-preview" alt="logo 預覽">

    </div>
    <div class="section-label">色彩情境</div>
    <div id="palette-modes">
      <div class="pm-chip active" data-mode="colorful"><span class="dot" style="background:#f66"></span>彩色</div>
      <div class="pm-chip" data-mode="muted"><span class="dot" style="background:#C4A8A0"></span>柔和</div>

  <div class="preview-col">

</div>

      <div class="carousel-track" id="carouselTrack">

        </a>
        <a class="product-card" href="https://out-of-design.com/index.php/product/figma_interactive_course/" target="_blank">
          <img class="product-card-img" src="https://out-of-design.com/wp-content/uploads/2024/04/Figma-Prototyping-Course-Cover-800x600.jpg">
          <div class="product-card-body">

            <div class="product-card-price"><span class="price-current">NT$ 1,980</span></div>

          <img class="product-card-img" src="https://out-of-design.com/wp-content/uploads/2023/12/Social-Media-Planner-Cover-800x600.jpg">
          <div class="product-card-body">

      </div>
    </div>
  </div>
  <div class="newsletter-cta">
    <h2>想學習更多設計方法嗎？</h2>

  <div class="back-home"><a href="https://out-of-design.com/">回圈外設計首頁</a></div>
</div>

<canvas id="export-canvas" width="1080" height="1920" style="display:none;"></canvas>

<script>
// --- 工具邏輯 ---
const fileInput = document.getElementById('file-input'), dropZone = document.getElementById('drop-zone'), previewThumb = document.getElementById('preview-thumb'), generateBtn = document.getElementById('generate-btn'), liveCanvas = document.getElementById('live-canvas'), lctx = liveCanvas.getContext('2d'), exportCanvas = document.getElementById('export-canvas'), ectx = exportCanvas.getContext('2d');
let userImg = null, extractedColors = [];

fileInput.onchange = e => loadImg(e.target.files[0]);
function loadImg(file) {
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => { userImg = img; previewThumb.src = e.target.result; previewThumb.style.display = 'block'; generateBtn.disabled = false; drawAll(); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function drawAll() {
  [ {c:lctx, w:165, h:293, s:165/1080}, {c:ectx, w:1080, h:1920, s:1} ].forEach(obj => {
    const ctx = obj.c, W = obj.w, H = obj.h, s = obj.s;
    ctx.fillStyle = '#fff'; ctx.fillRect(0,0,W,H);
    if(userImg) {
      const iw = W - (180*s), ih = iw;
      ctx.drawImage(userImg, 90*s, 90*s, iw, ih);
    }
  });
}

// --- 輪播邏輯：每 2 秒轉 2 張，無限輪播 ---
function initCarousel() {
  const track = document.getElementById('carouselTrack'), cards = Array.from(track.children), cardCount = cards.length;
  if (cardCount === 0) return;

  // 無限輪播：複製前兩張
  cards.forEach((c, i) => { if (i < 2) track.appendChild(c.cloneNode(true)); });

  let idx = 0;
  setInterval(() => {
    idx += 2; 
    track.style.transition = "transform 0.5s ease-in-out";
    const gap = 14;
    const w = cards[0].offsetWidth + gap;
    track.style.transform = `translateX(-${idx * w}px)`;

    if (idx >= cardCount) {
      setTimeout(() => {
        track.style.transition = "none";
        idx = 0;
        track.style.transform = `translateX(0)`;
      }, 500);
    }
  }, 2000);
}
window.onload = initCarousel;
</script>
</body>
</html>
