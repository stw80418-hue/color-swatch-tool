<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>色票生成工具 — Out of Design</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #fff; color: #1a1a1a;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px;
  }
  h1 { font-size: 22px; font-weight: 600; letter-spacing: 0.03em; margin-bottom: 4px; color: #1a1a1a; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 32px; }

  .layout {
    display: flex; gap: 24px; align-items: flex-start;
    width: 100%; max-width: 700px;
  }
  .panel {
    flex: 1; min-width: 0;
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 16px; padding: 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .preview-col {
    width: 165px; flex-shrink: 0;
    position: sticky; top: 40px;
  }
  #live-canvas {
    width: 165px; height: 293px;
    border-radius: 10px; display: block;
    background: #f0f0f0;
    border: 1px solid #e8e8e8;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  .preview-label {
    font-size: 11px; color: #aaa;
    text-align: center; margin-top: 8px; letter-spacing: 0.04em;
  }

  /* Drop zone */
  #drop-zone {
    border: 1.5px dashed #d0d0d0; border-radius: 12px;
    padding: 28px 16px; text-align: center; cursor: pointer;
    transition: background 0.2s, border-color 0.2s; margin-bottom: 18px;
    background: #fafafa;
  }
  #drop-zone:hover, #drop-zone.drag-over {
    background: #f0fafa; border-color: #1ca2a5;
  }
  #drop-zone p { font-size: 12px; color: #aaa; margin-top: 6px; }
  #upload-btn {
    display: inline-block; padding: 9px 22px;
    border: 1.5px solid #1ca2a5; border-radius: 8px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    background: #fff; color: #1ca2a5; margin-bottom: 4px;
    transition: background 0.2s, color 0.2s;
  }
  #upload-btn:hover { background: #1ca2a5; color: #fff; }
  #file-input { display: none; }
  #preview-thumb {
    width: 100%; max-height: 120px; object-fit: cover;
    border-radius: 8px; display: none; margin-top: 12px;
  }

  /* Logo box */
  .logo-box {
    background: #f8f8f8; border: 1px solid #ebebeb;
    border-radius: 10px; padding: 12px 14px; margin-bottom: 16px;
  }
  .logo-box p { font-size: 12px; color: #888; line-height: 1.6; }
  #logo-upload-btn {
    display: inline-block; margin-top: 8px; padding: 6px 14px;
    border: 1px solid #d0d0d0; border-radius: 6px;
    font-size: 12px; cursor: pointer;
    background: #fff; color: #555;
    transition: border-color 0.2s, color 0.2s;
  }
  #logo-upload-btn:hover { border-color: #1ca2a5; color: #1ca2a5; }
  #logo-file-input { display: none; }
  #logo-status { font-size: 11px; margin-top: 6px; color: #bbb; }
  #logo-status.ok { color: #1ca2a5; }
  #logo-preview { height: 28px; margin-top: 8px; display: none; opacity: 0.8; }

  /* Section label */
  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.09em;
    color: #aaa; text-transform: uppercase; margin: 14px 0 8px;
  }

  /* Palette mode chips */
  #palette-modes { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
  .pm-chip {
    padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer;
    border: 1px solid #e0e0e0; background: #fff; color: #666;
    transition: all 0.15s;
  }
  .pm-chip:hover { border-color: #1ca2a5; color: #1ca2a5; }
  .pm-chip.active { background: #1ca2a5; color: #fff; border-color: #1ca2a5; }
  .pm-chip .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

  /* Color list */
  #color-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .color-row {
    display: flex; align-items: center; gap: 8px;
    background: #fafafa; border: 1px solid #ebebeb;
    border-radius: 8px; padding: 7px 10px;
    transition: border-color 0.15s;
  }
  .color-row:hover { border-color: #1ca2a5; }
  .cswatch {
    width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
    position: relative; overflow: hidden;
    border: 1px solid #ddd; cursor: pointer;
  }
  .cswatch input[type=color] {
    position: absolute; inset: -4px;
    width: calc(100% + 8px); height: calc(100% + 8px);
    opacity: 0; cursor: pointer;
  }
  .cname {
    flex: 1; background: transparent; border: none; outline: none;
    font-size: 12px; font-weight: 500; color: #1a1a1a;
    font-family: -apple-system, sans-serif; min-width: 0;
  }
  .chex { font-size: 11px; color: #aaa; font-family: monospace; }

  /* Mode toggle */
  .mode-toggle { display: flex; gap: 6px; margin-bottom: 12px; }
  .mode-btn {
    flex: 1; padding: 7px; border-radius: 8px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: 1px solid #e0e0e0;
    background: #fff; color: #888; transition: all 0.15s;
  }
  .mode-btn:hover { border-color: #1ca2a5; color: #1ca2a5; }
  .mode-btn.active { background: #1ca2a5; color: #fff; border-color: #1ca2a5; }

  /* Sliders */
  .ctrl { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .ctrl label { font-size: 12px; color: #888; width: 68px; flex-shrink: 0; }
  .ctrl input[type=range] {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; background: #e8e8e8; border-radius: 2px; outline: none;
  }
  .ctrl input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    background: #1ca2a5; border-radius: 50%; cursor: pointer;
    box-shadow: 0 1px 4px rgba(28,162,165,0.4);
  }
  .ctrl .val { font-size: 12px; font-weight: 600; color: #1ca2a5; min-width: 28px; text-align: right; }
  .divider { border: none; border-top: 1px solid #f0f0f0; margin: 14px 0; }

  /* Buttons */
  #generate-btn {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    background: #1ca2a5; color: #fff;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 12px; margin-bottom: 8px;
    letter-spacing: 0.02em;
  }
  #generate-btn:hover { opacity: 0.88; }
  #generate-btn:active { transform: scale(0.99); }
  #generate-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  #download-btn {
    width: 100%; padding: 11px;
    border: 1.5px solid #1ca2a5; border-radius: 10px;
    background: #fff; color: #1ca2a5;
    font-size: 14px; font-weight: 500; cursor: pointer;
    display: none; transition: background 0.2s, color 0.2s;
  }
  #download-btn:hover { background: #1ca2a5; color: #fff; }
  #status {
    font-size: 12px; color: #aaa;
    margin-top: 8px; min-height: 18px; text-align: center;
  }

  canvas { display: none; }

  @media (max-width: 520px) {
    .layout { flex-direction: column-reverse; align-items: center; }
    .preview-col { position: static; width: 100%; display: flex; flex-direction: column; align-items: center; }
    #live-canvas { width: 150px; height: 267px; }
  }
</style>
</head>
<body>

<h1>色票生成工具</h1>
<p class="subtitle">Out of Design · 9:16 直式輸出</p>

<div class="layout">
  <div class="panel">

    <!-- 主圖上傳 -->
    <div id="drop-zone">
      <button id="upload-btn" onclick="document.getElementById('file-input').click()">選擇圖片</button>
      <p>或將圖片拖放至此</p>
      <img id="preview-thumb" alt="預覽">
      <input type="file" id="file-input" accept="image/*">
    </div>

    <!-- Logo 上傳 -->
    <div class="logo-box">
      <p>上傳你的 LOGO，會自動放在色票圖底部中央。</p>
      <button id="logo-upload-btn" onclick="document.getElementById('logo-file-input').click()">上傳 LOGO</button>
      <input type="file" id="logo-file-input" accept="image/*">
      <img id="logo-preview" alt="logo 預覽">
      <div id="logo-status">尚未載入 LOGO</div>
    </div>

    <!-- 色彩情境 -->
    <div class="section-label">色彩情境</div>
    <div id="palette-modes">
      <div class="pm-chip active" data-mode="colorful"><span class="dot" style="background:#f66"></span>彩色</div>
      <div class="pm-chip" data-mode="bright"><span class="dot" style="background:#FFD700"></span>亮色</div>
      <div class="pm-chip" data-mode="muted"><span class="dot" style="background:#C4A8A0"></span>柔和</div>
      <div class="pm-chip" data-mode="deep"><span class="dot" style="background:#3A4A6B"></span>深色</div>
      <div class="pm-chip" data-mode="dark"><span class="dot" style="background:#333"></span>暗色</div>
      <div class="pm-chip" data-mode="none"><span class="dot" style="background:#ccc"></span>無</div>
    </div>

    <!-- 顏色模式 -->
    <div class="section-label" style="margin-top:16px;">顏色模式</div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-auto" onclick="setEditMode('auto')">自動提取</button>
      <button class="mode-btn" id="btn-manual" onclick="setEditMode('manual')">自訂顏色</button>
    </div>
    <div id="color-list"></div>

    <!-- 間距設定 -->
    <hr class="divider">
    <div class="section-label">間距設定</div>
    <div class="ctrl"><label>色票間距</label><input type="range" id="gap" min="0" max="60" value="22" step="1"><span class="val" id="gap-out">22</span></div>
    <div class="ctrl"><label>左右留白</label><input type="range" id="margin-x" min="20" max="160" value="90" step="5"><span class="val" id="margin-x-out">90</span></div>
    <div class="ctrl"><label>頂部留白</label><input type="range" id="margin-top" min="20" max="200" value="90" step="5"><span class="val" id="margin-top-out">90</span></div>
    <div class="ctrl"><label>圓角大小</label><input type="range" id="radius" min="0" max="40" value="16" step="2"><span class="val" id="radius-out">16</span></div>

    <button id="generate-btn" disabled>⬇ 生成並下載（1080 × 1920）</button>
    <button id="download-btn">再次下載</button>
    <div id="status"></div>
  </div>

  <!-- 即時預覽 -->
  <div class="preview-col">
    <canvas id="live-canvas"></canvas>
    <div class="preview-label">即時預覽</div>
  </div>
</div>

<canvas id="hidden-canvas"></canvas>

<script>
const fileInput    = document.getElementById('file-input');
const logoFileInput= document.getElementById('logo-file-input');
const dropZone     = document.getElementById('drop-zone');
const generateBtn  = document.getElementById('generate-btn');
const downloadBtn  = document.getElementById('download-btn');
const statusEl     = document.getElementById('status');
const hiddenCanvas = document.getElementById('hidden-canvas');
const liveCanvas   = document.getElementById('live-canvas');
const liveCtx      = liveCanvas.getContext('2d');
const colorListEl  = document.getElementById('color-list');
const previewThumb = document.getElementById('preview-thumb');
const logoStatus   = document.getElementById('logo-status');
const logoPreview  = document.getElementById('logo-preview');

liveCanvas.width = 330; liveCanvas.height = 586;

let uploadedImage=null, logoImage=null, lastDataURL=null;
let allPixels=[], paletteMode='colorful', editMode='auto';
let autoColors=[], manualColors=[];

// Palette chips
document.querySelectorAll('.pm-chip').forEach(chip=>{
  chip.addEventListener('click',()=>{
    document.querySelectorAll('.pm-chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active'); paletteMode=chip.dataset.mode;
    if(allPixels.length && editMode==='auto'){
      autoColors=extractByMode(allPixels,5,paletteMode);
      renderColorList(); renderLive();
    }
  });
});

function setEditMode(m){
  editMode=m;
  document.getElementById('btn-auto').classList.toggle('active',m==='auto');
  document.getElementById('btn-manual').classList.toggle('active',m==='manual');
  renderColorList(); renderLive();
}

// Sliders
[['gap','gap-out'],['margin-x','margin-x-out'],['margin-top','margin-top-out'],['radius','radius-out']].forEach(([id,out])=>{
  document.getElementById(id).addEventListener('input',e=>{
    document.getElementById(out).textContent=e.target.value; renderLive();
  });
});

function getParams(){
  return{
    gap:     parseInt(document.getElementById('gap').value),
    marginX: parseInt(document.getElementById('margin-x').value),
    marginT: parseInt(document.getElementById('margin-top').value),
    radius:  parseInt(document.getElementById('radius').value),
  };
}
function getActiveColors(){ return editMode==='auto'?autoColors:manualColors; }

// HSL for palette filtering
function rgbToHsl(r,g,b){
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}else{
    const d=max-min; s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;default:h=((r-g)/d+4)/6;}
  }
  return{h:h*360,s:s*100,l:l*100};
}
function filterPixels(pixels,mode){
  if(mode==='none')return pixels;
  return pixels.filter(([r,g,b])=>{
    const{s,l}=rgbToHsl(r,g,b);
    if(mode==='colorful') return s>25&&l>15&&l<85;
    if(mode==='bright')   return s>40&&l>65;
    if(mode==='muted')    return s<40&&l>30&&l<80;
    if(mode==='deep')     return s>20&&l>15&&l<45;
    if(mode==='dark')     return l<25;
    return true;
  });
}
function extractByMode(pixels,count,mode){
  const filtered=filterPixels(pixels,mode);
  const pool=filtered.length>100?filtered:pixels;
  return kMeans(pool,count,25).map(([r,g,b])=>({r,g,b,name:colorName(r,g,b)}));
}

// File handlers
function handleFile(file){
  if(!file||!file.type.startsWith('image/'))return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      uploadedImage=img;
      previewThumb.src=e.target.result;
      previewThumb.style.display='block';
      allPixels=getPixels(img);
      autoColors=extractByMode(allPixels,5,paletteMode);
      if(!manualColors.length) manualColors=autoColors.map(c=>({...c}));
      generateBtn.disabled=false;
      renderColorList(); renderLive();
      statusEl.textContent='上傳完成，切換情境即時預覽。';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
fileInput.addEventListener('change',e=>handleFile(e.target.files[0]));
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');handleFile(e.dataTransfer.files[0]);});

logoFileInput.addEventListener('change',e=>{
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      logoImage=img;
      logoPreview.src=ev.target.result;
      logoPreview.style.display='block';
      logoStatus.textContent='✓ 已載入：'+file.name;
      logoStatus.className='ok';
      renderLive();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
});

// Color list UI
function renderColorList(){
  colorListEl.innerHTML='';
  const colors=getActiveColors();
  colors.forEach((c,i)=>{
    const hex=toHex(c.r,c.g,c.b);
    const row=document.createElement('div'); row.className='color-row';
    const sw=document.createElement('div'); sw.className='cswatch'; sw.style.background=hex;
    const pk=document.createElement('input'); pk.type='color'; pk.value=hex;
    pk.addEventListener('input',e=>{
      const{r,g,b}=hexToRgb(e.target.value);
      colors[i].r=r;colors[i].g=g;colors[i].b=b;
      sw.style.background=e.target.value;
      hx.textContent=e.target.value.toUpperCase();
      renderLive();
    });
    sw.appendChild(pk);
    const ni=document.createElement('input'); ni.className='cname'; ni.value=c.name; ni.placeholder='顏色名稱';
    ni.addEventListener('input',e=>{colors[i].name=e.target.value;renderLive();});
    const hx=document.createElement('span'); hx.className='chex'; hx.textContent=hex;
    row.append(sw,ni,hx); colorListEl.appendChild(row);
  });
  if(editMode==='manual'){
    const ab=document.createElement('button');
    ab.textContent='+ 新增顏色';
    ab.style.cssText='width:100%;padding:7px;border:1px dashed #d0d0d0;border-radius:8px;background:#fff;color:#aaa;font-size:12px;cursor:pointer;margin-top:4px;transition:border-color 0.2s,color 0.2s;';
    ab.onmouseover=()=>{ab.style.borderColor='#1ca2a5';ab.style.color='#1ca2a5';};
    ab.onmouseout=()=>{ab.style.borderColor='#d0d0d0';ab.style.color='#aaa';};
    ab.onclick=()=>{manualColors.push({r:180,g:180,b:180,name:'NEW COLOR'});renderColorList();renderLive();};
    colorListEl.appendChild(ab);
  }
}

// Auto-fit font size
function fitText(ctx,text,weight,maxSize,minSize,maxWidth,family){
  let size=maxSize;
  ctx.font=`${weight} ${size}px ${family}`;
  while(ctx.measureText(text).width>maxWidth&&size>minSize){ size--; ctx.font=`${weight} ${size}px ${family}`; }
  return size;
}

// Core draw
function drawToCanvas(ctx,W,H,colors,logo,params){
  const{gap,marginX,marginT,radius}=params;
  const count=colors.length, scale=W/1080;
  ctx.clearRect(0,0,W,H);

  // BG — no overlay
  if(uploadedImage){
    const ia=uploadedImage.width/uploadedImage.height,ca=W/H;
    let sx=0,sy=0,sw=uploadedImage.width,sh=uploadedImage.height;
    if(ia>ca){sw=sh*ca;sx=(uploadedImage.width-sw)/2;}else{sh=sw/ca;sy=(uploadedImage.height-sh)/2;}
    ctx.drawImage(uploadedImage,sx,sy,sw,sh,0,0,W,H);
  }else{ctx.fillStyle='#e8e8e8';ctx.fillRect(0,0,W,H);}

  const LOGO_H=180*scale, SWATCH_TOTAL=H-LOGO_H;
  const mX=marginX*scale, mT=marginT*scale, g=gap*scale, rv=radius*scale;
  const swatchW=W-mX*2;
  const swatchH=Math.floor((SWATCH_TOTAL-mT-80*scale-(count-1)*g)/count);
  const fontFamily="'Arial Black',Arial,sans-serif";
  const pad=28*scale;

  for(let i=0;i<count;i++){
    const{r,g:gv,b,name}=colors[i];
    const hex=toHex(r,gv,b), cmyk=toCmyk(r,gv,b), l=lum(r,gv,b);
    const y=mT+i*(swatchH+g);

    ctx.fillStyle=hex; rrect(ctx,mX,y,swatchW,swatchH,rv); ctx.fill();

    const tc=l>148?'#111':'#fff';
    const lc=l>148?'rgba(0,0,0,0.52)':'rgba(255,255,255,0.68)';
    const labelSize=Math.round(swatchH*0.145);
    const nameMaxSize=Math.round(swatchH*0.185);
    const nameMinSize=Math.round(Math.max(labelSize*0.85,8*scale));
    const nameMaxW=swatchW-pad*2;

    // Name — right top, auto-fit
    const actualNameSize=fitText(ctx,name||hex,'700',nameMaxSize,nameMinSize,nameMaxW,fontFamily);
    ctx.fillStyle=tc;
    ctx.font=`700 ${actualNameSize}px ${fontFamily}`;
    ctx.textAlign='right';
    ctx.fillText(name||hex, mX+swatchW-pad, y+pad+actualNameSize);
    ctx.textAlign='left';

    // HEX / RGB / CMYK — bottom left
    ctx.fillStyle=lc;
    ctx.font=`500 ${labelSize}px Arial,sans-serif`;
    const lineH=labelSize*1.55;
    const labelsY=y+swatchH-pad-lineH*2;
    ctx.fillText(`HEX  ${hex}`,mX+pad,labelsY);
    ctx.fillText(`RGB  ${r}, ${gv}, ${b}`,mX+pad,labelsY+lineH);
    ctx.fillText(`CMYK  ${cmyk[0]}, ${cmyk[1]}, ${cmyk[2]}, ${cmyk[3]}`,mX+pad,labelsY+lineH*2);
  }

  // Logo
  if(logo){
    const lh=100*scale,lw=logo.width*(lh/logo.height);
    ctx.drawImage(logo,(W-lw)/2,SWATCH_TOTAL+(LOGO_H-lh)/2,lw,lh);
  }
}

function renderLive(){
  const c=getActiveColors(); if(!c.length)return;
  drawToCanvas(liveCtx,liveCanvas.width,liveCanvas.height,c,logoImage,getParams());
}

// Utils
function getPixels(img){
  const s=200; hiddenCanvas.width=s; hiddenCanvas.height=s;
  const ctx=hiddenCanvas.getContext('2d'); ctx.drawImage(img,0,0,s,s);
  const data=ctx.getImageData(0,0,s,s).data, px=[];
  for(let i=0;i<data.length;i+=4){if(data[i+3]<128)continue;px.push([data[i],data[i+1],data[i+2]]);}
  return px;
}
function kMeans(px,k,it){
  const step=Math.floor(px.length/k);
  let c=Array.from({length:k},(_,i)=>px[i*step].slice());
  for(let iter=0;iter<it;iter++){
    const cl=Array.from({length:k},()=>[]);
    for(const p of px){let b=0,bd=Infinity;for(let j=0;j<k;j++){const d=cd(p,c[j]);if(d<bd){bd=d;b=j;}}cl[b].push(p);}
    for(let j=0;j<k;j++){if(!cl[j].length)continue;c[j]=[0,1,2].map(x=>Math.round(cl[j].reduce((s,p)=>s+p[x],0)/cl[j].length));}
  }
  return c;
}
function cd(a,b){return(a[0]-b[0])**2+(a[1]-b[1])**2+(a[2]-b[2])**2;}
function toHex(r,g,b){return'#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0').toUpperCase()).join('');}
function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function toCmyk(r,g,b){
  r/=255;g/=255;b/=255;const k=1-Math.max(r,g,b);
  if(k===1)return[0,0,0,100];
  return[Math.round((1-r-k)/(1-k)*100),Math.round((1-g-k)/(1-k)*100),Math.round((1-b-k)/(1-k)*100),Math.round(k*100)];
}
function lum(r,g,b){return 0.299*r+0.587*g+0.114*b;}
function colorName(r,g,b){
  const n=[
    {n:'BURGUNDY',r:108,g:8,b:32},{n:'CHERRY BLOSSOM PINK',r:242,g:174,b:188},
    {n:'MISTY ROSE',r:242,g:220,b:219},{n:'SILVER LAKE BLUE',r:90,g:134,b:203},
    {n:'LAPIS LAZULI',r:61,g:93,b:145},{n:'CRIMSON RED',r:220,g:20,b:60},
    {n:'CORAL',r:255,g:127,b:80},{n:'GOLDEN YELLOW',r:255,g:215,b:0},
    {n:'FOREST GREEN',r:34,g:139,b:34},{n:'SKY BLUE',r:135,g:206,b:235},
    {n:'MIDNIGHT BLUE',r:25,g:25,b:112},{n:'LAVENDER',r:230,g:230,b:250},
    {n:'SALMON',r:250,g:128,b:114},{n:'OLIVE',r:128,g:128,b:0},
    {n:'TEAL',r:0,g:128,b:128},{n:'IVORY',r:255,g:255,b:240},
    {n:'CHARCOAL',r:54,g:69,b:79},{n:'PERIWINKLE',r:204,g:204,b:255},
    {n:'ROSE GOLD',r:183,g:110,b:121},{n:'DUSTY BLUE',r:100,g:149,b:180},
    {n:'WARM WHITE',r:245,g:245,b:240},{n:'SLATE GRAY',r:112,g:128,b:144},
    {n:'TERRACOTTA',r:226,g:114,b:91},{n:'SAGE GREEN',r:143,g:188,b:143},
    {n:'DUSTY PINK',r:219,g:152,b:152},{n:'NAVY',r:0,g:0,b:128},
    {n:'PEACH',r:255,g:218,b:185},{n:'MAUVE',r:224,g:176,b:255},
  ];
  let best=n[0],bd=Infinity;
  for(const x of n){const d=cd([r,g,b],[x.r,x.g,x.b]);if(d<bd){bd=d;best=x;}}
  return best.n;
}
function rrect(ctx,x,y,w,h,r){
  if(r===0){ctx.beginPath();ctx.rect(x,y,w,h);return;}
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function loadImg(src){
  return new Promise(r=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>r(i);i.onerror=()=>r(null);i.src=src;});
}
